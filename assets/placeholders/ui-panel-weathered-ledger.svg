<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Weathered ledger panel placeholder</title>
  <desc id="desc">Dark coffee panel with aged brass border and subtle paper wear.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#332418"/>
      <stop offset="1" stop-color="#15110C"/>
    </linearGradient>
    <pattern id="grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 2H18M3 0V18" stroke="#8A6A35" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#panel)"/>
  <rect width="640" height="360" fill="url(#grain)"/>
  <rect x="14" y="14" width="612" height="332" rx="8" fill="none" stroke="#8A6A35" stroke-width="4"/>
  <rect x="28" y="28" width="584" height="304" rx="4" fill="none" stroke="#D6A73A" stroke-opacity=".28" stroke-width="1"/>
</svg>
